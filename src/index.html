<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geochron Screensaver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="safe-area-detector"></div>
    <div id="container" style="position: relative; width: 100%; height: 100%;">
        <canvas id="geochronCanvas" style="position: absolute; top: 0; left: 0;"></canvas>
        <canvas id="overlayCanvas" style="position: absolute; top: 0; left: 0; z-index: 10;"></canvas>
    </div>

    <div id="settingsPanel">
        <div class="panel-handle">⚙️</div>
        <div class="panel-content">
            <h3>Geochron Engine Settings</h3>
            <hr />
            
            <div class="control-group">
                <label for="themeSelector">Active Theme</label>
                <select id="themeSelector" style="width: 100%; padding: 6px; background: #070a0f; border: 1px solid #222943; color: white; border-radius: 4px; margin-bottom: 10px;">
                    <option value="">Internal-Legacy</option>
                </select>
            </div>
            
            <div class="control-group">
                <label for="opacitySlider">Shadow Opacity</label>
                <input type="range" id="opacitySlider" min="0" max="90" value="55">
            </div>
            
            <hr />
            <h4>Tracked Pins</h4>
            <div id="pinsList"></div>
            
            <div class="add-pin-form">
                <input type="text" id="pinName" placeholder="Name (e.g. London)" list="citiesList">
                <datalist id="citiesList"></datalist>
                <div class="row">
                    <input type="number" id="pinLat" step="0.0001" placeholder="Lat (51.5)">
                    <input type="number" id="pinLon" step="0.0001" placeholder="Lon (-0.1)">
                </div>
                <button id="addPinBtn">Add Custom Pin</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
