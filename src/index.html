<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novaframe Screensaver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="safe-area-detector"></div>
    <div id="container" style="position: relative; width: 100%; height: 100%;">
    </div>

    <div id="settingsPanel">
        <div class="panel-content">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="assets/logo.png" alt="Novaframe Logo" style="width: 32px; height: 32px; border-radius: 6px;">
                <h3 style="margin: 0;">Novaframe Engine</h3>
            </div>
            <hr />

            <!-- COMMON-SCOPE: visible for all themes -->
            <div class="control-group">
                <label for="themeSelector">Active Theme</label>
                <div style="display: flex; gap: 8px; margin-bottom: 12px; align-items: center;">
                    <select id="themeSelector" style="flex: 1; height: 36px; box-sizing: border-box; margin-bottom: 0;">
                        <option value="" disabled>Select a Theme...</option>
                    </select>
                    <button id="refreshThemeBtn" style="width: 36px; height: 36px; box-sizing: border-box; flex-shrink: 0; padding: 0; border-radius: 6px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; transition: all 0.2s ease;" title="Reload Wallpaper">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>
                <button id="openStoreBtn" class="btn-primary">
                    Browse Marketplace
                </button>
            </div>

            <!-- Dynamic Custom Settings (injected based on manifest) -->
            <section id="customSettingsSection">
                <!-- Dynamically populated by app.js -->
            </section>


            <hr />
            <div class="control-group">
                <button id="updateBtn" class="btn-secondary">
                    Check for Updates
                </button>
                <div id="updateStatus" class="status-text"></div>
                <div id="updateRestartBanner" style="display:none; margin-top:8px; padding:8px 10px; border-radius:8px; background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.35); font-size:12px;">
                    <span>Update ready.</span>
                    <button id="updateRestartBtn" class="btn-secondary" style="margin-left:6px;">Restart to apply</button>
                </div>
            </div>
        </div>
        <div class="panel-handle">
            <svg class="cog-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
